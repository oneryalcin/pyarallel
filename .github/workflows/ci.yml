name: CI

on:
  push:
    branches: [main]
  pull_request:
  # Reusable: the release workflow calls this so a v* tag must pass the
  # COMPLETE gate — lint, both type checkers, full matrix, free-threaded,
  # OS smoke, wheel gate, resilience demo, strict docs — not just pytest.
  workflow_call:

jobs:
  checks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: uv sync --group dev
      - name: Lint
        run: |
          uv run ruff check pyarallel tests
          uv run ruff format --check pyarallel tests
      - name: Type check (strict, package + typing assertions)
        run: uv run mypy pyarallel tests/typing_assertions.py
      # Second checker, one matrix entry: the unary .map() item typing is
      # a both-checkers contract (v0.8 plan A1). Deliberately unpinned —
      # a new pyright breaking inference is exactly what this catches.
      - name: Type check (pyright, typing assertions)
        if: matrix.python-version == '3.12'
        run: uvx pyright tests/typing_assertions.py
      - name: Tests
        run: uv run pytest -q
      - name: Docs (strict)
        run: DISABLE_MKDOCS_2_WARNING=true uv run mkdocs build --strict

  # Free-threaded builds run the test suite with the GIL off. Test deps
  # only: the dev group cannot build on 3.13t (cffi, via mkdocs-material),
  # and lint/type/docs are ABI-independent — they already run above.
  free-threaded:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.13t", "3.14t"]
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: ${{ matrix.python-version }}
      # --no-default-groups --group test, NOT --only-group: --only-group
      # omits the project itself and the suite collects nothing.
      - name: Install (project + test group)
        run: uv sync --no-default-groups --group test
      # Start-of-job sanity check: fail loudly if setup resolved a standard
      # build or a dependency re-enabled the GIL — a green job on the wrong
      # interpreter would be testing nothing. --no-sync everywhere below:
      # a bare `uv run` re-syncs the default (dev) group, which cannot
      # build on t-ABIs — the exact thing this job avoids.
      - name: GIL guard
        run: uv run --no-sync python -c "import sys; assert not sys._is_gil_enabled(), 'GIL is enabled on a free-threaded job'"
      - name: Tests
        run: uv run --no-sync pytest -q

  # The process executor's fork/spawn split and checkpoint file handling
  # are documented as platform-dependent but were Ubuntu-only-tested
  # (v0.8 plan item 8). One Python each, focused subset — Ubuntu keeps
  # the full matrix above.
  os-smoke:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install (project + test group)
        run: uv sync --no-default-groups --group test
      - name: Smoke tests (engine, process executor, checkpoint, results)
        run: uv run --no-sync pytest -q tests/test_parallel_map.py tests/test_parity.py tests/test_checkpoint.py tests/test_result.py tests/test_run_status.py tests/test_starmap.py

  # The artifact users install is not the repo checkout: build wheel +
  # sdist, clean-install the wheel into a bare venv, import it, run a
  # real call, and type-check against the *installed* package (py.typed
  # must ship for mypy to see any types at all).
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Build wheel + sdist
        run: uv build
      # Both artifacts must install (v0.10 review: wheel-only left the
      # sdist path untested); the sdist installs into its own venv, the
      # wheel into the venv the rest of the gates use.
      - name: Clean-install sdist
        run: |
          uv venv /tmp/sdist-smoke --python 3.12
          uv pip install --python /tmp/sdist-smoke/bin/python dist/*.tar.gz
          /tmp/sdist-smoke/bin/python -c "import pyarallel; print('sdist OK', pyarallel.__version__)"
      - name: Clean-install wheel and smoke it
        run: |
          uv venv /tmp/smoke --python 3.12
          uv pip install --python /tmp/smoke/bin/python dist/*.whl
          /tmp/smoke/bin/python -c "
          import pyarallel
          from pyarallel import parallel_map, RunStatus
          r = parallel_map(lambda x: x * 2, [1, 2, 3])
          assert r.values() == [2, 4, 6], r
          assert r.status is RunStatus.COMPLETED
          print('installed', pyarallel.__version__, 'OK')
          "
      # The resilience demo is an executable contract: it asserts the
      # headline claims (429 pool-pause, zero-429 pacing, SIGKILL
      # resume) against the installed wheel and exits non-zero if any
      # fail. ~10s.
      - name: Resilience demo against the installed wheel
        run: /tmp/smoke/bin/python examples/resilience_demo.py
      - name: py.typed ships and types resolve from the installed package
        run: |
          test -f "$(/tmp/smoke/bin/python -c 'import pyarallel, os; print(os.path.dirname(pyarallel.__file__))')/py.typed"
          printf 'from pyarallel import parallel_map\nfrom typing import assert_type\nfrom pyarallel import ParallelResult\ndef f(x: int) -> str: return str(x)\nassert_type(parallel_map(f, [1]), ParallelResult[str])\n' > /tmp/probe.py
          uvx --with dist/*.whl mypy --strict /tmp/probe.py
