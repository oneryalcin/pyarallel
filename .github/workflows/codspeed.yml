name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  simulation:
    name: CPU simulation benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install benchmark dependencies
        run: uv sync --no-default-groups --group benchmark
      - name: Run CPU simulation benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: uv run --no-sync pytest benchmarks/codspeed/test_public_api.py --codspeed

  memory:
    name: Memory scaling benchmarks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install benchmark dependencies
        run: uv sync --no-default-groups --group benchmark
      - name: Run memory scaling benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: memory
          run: uv run --no-sync pytest benchmarks/codspeed/test_memory.py --codspeed
