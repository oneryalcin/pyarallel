name: CodSpeed

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  benchmarks:
    name: Public API benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - name: Install benchmark dependencies
        run: uv sync --no-default-groups --group benchmark
      - name: Run CodSpeed pilot
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: uv run --no-sync pytest benchmarks/codspeed --codspeed
